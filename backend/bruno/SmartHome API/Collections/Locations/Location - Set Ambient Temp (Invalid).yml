info:
  name: Location - Set Ambient Temp (Invalid)
  type: http
  seq: 1

http:
  method: PUT
  url: "{{baseUrl}}/api/locations/living room/ambient-temperature"
  body:
    type: json
    data: |-
      {
        "temperature": -999
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Verifies that invalid temperature values are rejected by validation.
