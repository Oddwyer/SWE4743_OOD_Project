info:
  name: Control Device - Set Fan Speed
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/api/Devices/7a420ebf-e710-4d03-9079-132323754a2c/commands"
  body:
    type: json
    data: |-
      {
        "command": 3,
        "fanSpeed": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Verifies that valid control commands are accepted and applied to a device.
