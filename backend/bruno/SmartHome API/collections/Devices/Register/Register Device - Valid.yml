info:
  name: Register Device - Valid
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/Devices/register-device"
  body:
    type: json
    data: |-
      {
        "deviceName": "Living Room Light",
        "deviceLocation": "Living Room",
        "type": "Light"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Verifies that a device can be successfully registered with valid input data.
