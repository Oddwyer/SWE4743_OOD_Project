info:
  name: Control Device - Set Thermostat Mode
  type: http
  seq: 5

http:
  method: PUT
  url: "{{baseUrl}}/api/Devices/{deviceId}/commands"
  body:
    type: json
    data: |-
      {
        "command": 4,
        "mode": "Auto"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Verifies that valid control commands are accepted and applied to a device.
